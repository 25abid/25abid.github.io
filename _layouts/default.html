<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>
      {% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}
    </title>
    <meta name="description" content="{{ page.excerpt | strip_html | strip_newlines | truncate: 160 | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <div class="page">
      {% include header.html %}

      <main class="main" role="main">
        {{ content }}
      </main>

      {% include footer.html %}
    </div>
    <script>
      (function () {
        var body = document.body;
        if (!body) return;

        document.addEventListener("click", function (event) {
          var link = event.target.closest("a");
          if (!link) return;
          if (event.defaultPrevented || event.button !== 0) return;
          if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return;

          var href = link.getAttribute("href");
          if (!href || href.indexOf("#") === 0) return;
          if (link.target && link.target !== "_self") return;
          if (/^https?:\/\//i.test(href) && link.origin !== window.location.origin) return;

          body.classList.add("is-transitioning");
          event.preventDefault();
          window.setTimeout(function () {
            window.location.href = href;
          }, 180);
        });
      })();
    </script>
  </body>
</html>
